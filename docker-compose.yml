version: "2.4"

services:
  vote:
    build: ./src/vote
    image: ghcr.io/philipschmid/vote-demo-vote:1.0
    restart: on-failure
    ports:
      - "5000:80"
    networks:
      - front-tier
      - back-tier

  result:
    build: ./src/result
    image: ghcr.io/philipschmid/vote-demo-result:1.0
    restart: on-failure
    depends_on:
      - "db"
    ports:
      - 5001:80
    networks:
      - front-tier
      - back-tier

  worker:
    build: ./src/worker
    image: ghcr.io/philipschmid/vote-demo-worker:1.0
    restart: on-failure
    depends_on:
      - "redis"
    networks:
      - back-tier

  redis:
    image: redis:6.2.6
    container_name: redis
    restart: on-failure
    networks:
      - back-tier

  db:
    image: postgres:14.2-alpine
    container_name: db
    restart: on-failure
    environment:
      - POSTGRES_PASSWORD=postgres
    volumes:
      - "./db-data:/var/lib/postgresql/data"
    networks:
      - back-tier

networks:
  front-tier:
  back-tier:
    internal: true
